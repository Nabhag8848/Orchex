# Orchex Postgres OLTP local bench
services:
  postgres:
    build: .
    container_name: orchex-pgbench
    environment:
      POSTGRES_USER: orchex
      POSTGRES_PASSWORD: orchex
      POSTGRES_DB: orchex
      # Modest settings closer to a small RDS; not a full RDS clone.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "54329:5432"
    # Smaller box experiment: can Orchex targets hold on 1 vCPU / 2 GB?
    cpus: "1.0"
    mem_limit: 2g
    shm_size: "128mb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchex -d orchex"]
      interval: 3s
      timeout: 5s
      retries: 30
    volumes:
      - orchex_pg_data:/var/lib/postgresql/data
      - ./results:/bench/results

volumes:
  orchex_pg_data:
